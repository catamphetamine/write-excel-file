<html>
  <head>
    <title>write-excel-file</title>

    <meta charset="utf-8">

    <script src="./write-excel-file.min.js"></script>

    <script src="./lib/promise-polyfill.min.js"></script>

    <script src="./lib/prism.js"></script>

    <style>
      body
      {
        margin : 20px;
        font-family : Arial, Helvetica;
        background: #434343;
        color: #dddddd;
      }

      .supersection
      {
      }

      .supersection-content > section > header
      {
        display: flex;
        align-items: center;
      }

      .supersection-content > section > header > button
      {
        padding: 0.5rem;
        background: none;
        border: none;
        cursor: pointer;
        color: #fd8900;
        margin-bottom: -5px;
        font-size: 0.75rem;
        margin-left: 0.5rem;
        border-radius: 5px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /*
      .supersection-content > section > header > button.selected
      {
        color: black;
        font-weight: bolder;
        background: #fd8900;
      }
      */

      .supersection-content > section > header > button:active
      {
        color: black;
        font-weight: bolder;
        background: #fd8900;
      }

      .supersection > button
      {
        padding: 1rem;
        background: none;
        /*background: #fd8900;*/
        border: none;
        cursor: pointer;
        color: #fd8900;
        margin-bottom: -5px;
        font-size: 1rem;
        border-radius: 5px;
        border: 2px solid #fd8900;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .supersection > button:active
      {
        background: #fd8900;
        color: black;
        font-weight: bolder;
      }

      #objects-columns-edit
      {
        display: none;
      }

      .supersection-content
      {
        display: flex;
      }

      .supersection-content > section
      {
        flex: 1;
      }

      .supersection-content > section
      {
        margin-left: 0.5rem;
        margin-right: 0.5rem;
      }

      .supersection-content > section:first-child
      {
        margin-left: 0;
      }

      .supersection-content > section:last-child
      {
        margin-right: 0;
      }

      .supersection-content > section > pre,
      .supersection-content > section > textarea
      {
        width: 100%;
        height: 24rem;
      }

      .supersection-content > section > pre
      {
        margin: 0;
        padding: 1rem;
      }

      .supersection-content > section > textarea
      {
        padding: 1rem;
        font-size: 1rem;
        line-height: 1.5rem;
        background-color: #2d2d2d;
        color: #ccc;
      }

      .supersection-content > section > pre
      {
        width: calc(100% - 2rem);
      }

      .supersection > button
      {
        margin-top: 1rem;
      }

      #main-link
      {
        display     : block;
        font-size   : 24px;
        color       : #fd8900;
        font-family : monospace;
        text-decoration : none;
      }

      code
      {
         color: #fd8900;
         font-size: 1.25em;
      }

      hr
      {
         opacity: 0.5;
         border-color: #fd8900;
         border-width: 1px;
         border-top-width: 0px;
      }

      .test-cases-page-link
      {
        color: #ccc;
        text-decoration: none;
      }

      .test-cases-page-link:hover
      {
        text-decoration: underline;
      }
    </style>

    <link href="lib/prism.css" rel="stylesheet" />
  </head>

  <body>
    <a id="main-link" href="https://www.npmjs.com/package/write-excel-file">
      write-excel-file
    </a>

    <br/>

    <div>
      Write <code style="color: inherit">.xlsx</code> files in a browser or Node.js
    </div>

    <br/>
    <br/>

    <div class="supersection">
      <div class="supersection-content">
        <section>
          <header>
            <h2>Data</h2>
            <button id="cell-data-edit">Edit</button>
          </header>
          <textarea id="cell-data" style="display: none"></textarea>
          <pre><code class="language-js" id="cell-data-view"></code></pre>
        </section>

        <section>
          <header>
            <h2>Column Settings</h2>
          </header>
          <pre><code class="language-js" id="cell-data-columns-view"></code></pre>
        </section>
      </div>

      <button id="write-xlsx-file-button-cells">
        Write *.xlsx file
      </button>
    </div>

    <br/>
    <br/>
    <br/>

    <hr/>

    <br/>

    <h2>
      When passing <code>objects</code> and <code>columns</code>
    </h2>

    <br/>

    <div class="supersection">
      <div class="supersection-content">
        <section>
          <header>
            <h2>Objects</h2>
            <button id="objects-edit">Edit</button>
          </header>
          <textarea id="objects" style="display: none"></textarea>
          <pre><code class="language-js" id="objects-view"></code></pre>
        </section>

        <section>
          <header>
            <h2>Columns</h2>
            <button id="objects-columns-edit">Edit</button>
          </header>
          <textarea readonly id="objects-columns" style="display: none"></textarea>
          <pre><code class="language-js" id="objects-columns-view"></code></pre>
        </section>
      </div>

      <button id="write-xlsx-file-button-objects">
        Write *.xlsx file
      </button>
    </div>

    <br/>
    <br/>

    <a class="test-cases-page-link" href="test-cases.html">
      See other test cases
    </a>

    <script>
      document.getElementById('objects-edit').onclick = function() {
        const objects = document.getElementById('objects')
        const objectsView = document.getElementById('objects-view').parentNode
        if (objects.style.display !== 'none') {
          objects.style.display = 'none';
          objectsView.style.display = 'block';
          document.getElementById('objects-edit').textContent = 'Edit'
          document.getElementById('objects-edit').className = ''
          document.getElementById('objects-view').innerHTML = Prism.highlight(
            document.getElementById('objects').value,
            Prism.languages.javascript,
            'javascript'
          )
        } else {
          objects.style.display = 'block';
          objectsView.style.display = 'none';
          document.getElementById('objects-edit').textContent = 'Save'
          document.getElementById('objects-edit').className = 'selected'
        }
      }

      document.getElementById('cell-data-edit').onclick = function() {
        const objects = document.getElementById('cell-data')
        const objectsView = document.getElementById('cell-data-view').parentNode
        if (objects.style.display !== 'none') {
          objects.style.display = 'none';
          objectsView.style.display = 'block';
          document.getElementById('cell-data-edit').textContent = 'Edit'
          document.getElementById('cell-data-edit').className = ''
          document.getElementById('cell-data-view').innerHTML = Prism.highlight(
            document.getElementById('cell-data').value,
            Prism.languages.javascript,
            'javascript'
          )
        } else {
          objects.style.display = 'block';
          objectsView.style.display = 'none';
          document.getElementById('cell-data-edit').textContent = 'Save'
          document.getElementById('cell-data-edit').className = 'selected'
        }
      }

      document.getElementById('objects').value = JSON.stringify([
        {
          name: 'John Smith',
          dateOfBirth: 999999999999999,
          income: 120000,
          married: true
        },
        {
          name: 'Alice Brown',
          dateOfBirth: 999999999999999,
          income: 60000,
          married: false
        }
      ], null, 2).replace(/999999999999999/g, 'new Date()')

      document.getElementById('objects-view').innerHTML = document.getElementById('objects').value

      const columnsWhenUsingObjects = [
        {
          header: {
            value: 'Name',
            fontWeight: 'bold'
          },
          cell: (person) => ({
            value: person.name
          }),
          width: 20
        },
        {
          header: {
            value: 'Date of Birth',
            fontWeight: 'bold'
          },
          cell: (person) => ({
            value: person.dateOfBirth,
            type: Date,
            format: 'mm/dd/yyyy'
          }),
          width: 14
        },
        {
          header: {
            value: 'Income',
            fontWeight: 'bold'
          },
          cell: (person) => ({
            value: person.income,
            type: Number,
            format: '#,##0.00'
          }),
          width: 12
        },
        {
          header: {
            value: 'Married',
            fontWeight: 'bold'
          },
          cell: (person) => ({
            value: person.married,
            type: Boolean
          })
        }
      ]

      const columns = [
        { width: 20 },
        { width: 14 },
        { width: 12 },
        {}
      ]

      document.getElementById('objects-columns').value = `
[
  {
    header: {
      value: 'Name',
      fontWeight: 'bold'
    },
    cell: (person) => ({
      value: person.name
    }),
    width: 20
  },
  {
    header: {
      value: 'Date of Birth',
      fontWeight: 'bold'
    },
    cell: (person) => ({
      value: person.dateOfBirth,
      type: Date,
      format: 'mm/dd/yyyy'
    }),
    width: 14
  },
  {
    header: {
      value: 'Income',
      fontWeight: 'bold'
    },
    cell: (person) => ({
      value: person.income,
      type: Number,
      format: '#,##0.00'
    }),
    width: 12
  },
  {
    header: {
      value: 'Married',
      fontWeight: 'bold'
    },
    cell: (person) => ({
      value: person.married,
      type: Boolean
    })
  }
]
`.trim()

      document.getElementById('objects-columns-view').innerHTML = document.getElementById('objects-columns').value

      document.getElementById('cell-data').value = JSON.stringify([
        [
          {
            value: 'Name',
            fontWeight: 'bold'
          },
          {
            value: 'Date of Birth',
            fontWeight: 'bold'
          },
          {
            value: 'Income',
            fontWeight: 'bold'
          },
          {
            value: 'Married',
            fontWeight: 'bold'
          }
        ],
        [
          {
            value: 'John Smith'
          },
          {
            value: 999999999999999,
            type: 'Date',
            format: 'mm/dd/yyyy'
          },
          {
            value: 1800,
            type: 'Number',
            format: '#,##0.00'
          },
          {
            value: true,
            type: 'Boolean'
          }
        ],
        [
          {
            value: 'Alice Brown'
          },
          {
            value: 999999999999999,
            type: 'Date',
            format: 'mm/dd/yyyy'
          },
          {
            value: 2599.99,
            type: 'Number',
            format: '#,##0.00'
          },
          {
            value: false,
            type: 'Boolean'
          }
        ]
      ], null, 2).replace(/999999999999999/g, 'new Date()')
        .replace(/"type": "([^",]+)"/g, '"type": $1')

      document.getElementById('cell-data-view').innerHTML = document.getElementById('cell-data').value


      document.getElementById('cell-data-columns-view').innerHTML = JSON.stringify(columns, null, 2)

      document.getElementById('write-xlsx-file-button-objects').addEventListener('click', () => {
        try {
          const objects = JSON.parse(
            document.getElementById('objects').value
              .replace(/new Date\(\)/g, '999999999999999')
          )
          for (const object of objects) {
            for (const key of Object.keys(object)) {
              if (object[key] === 999999999999999) {
                object[key] = new Date()
              }
            }
          }
          writeXlsxFile(objects, { columns: columnsWhenUsingObjects }).toFile('objects.xlsx').then(
            () => {
              // console.log('File created')
            },
            (error) => {
              console.error(error)
              alert('There was an error. See console output for the error stack trace.')
            }
          )
        } catch (error) {
          console.error(error)
          alert("There was an error. See console output for the error stack trace.")
        }
      })

      document.getElementById('write-xlsx-file-button-cells').addEventListener('click', () => {
        try {
          const data = JSON.parse(
            document.getElementById('cell-data').value
              .replace(/new Date\(\)/g, '999999999999999')
              .replace(/"type": ([^\s,]+)/g, '"type": "$1"')
          )
          for (const row of data) {
            for (const cell of row) {
              if (cell.value === 999999999999999) {
                cell.value = new Date()
              }
              switch (cell.type) {
                case 'Number':
                  cell.type = Number;
                  break;
                case 'String':
                  cell.type = String;
                  break;
                case 'Date':
                  cell.type = Date;
                  break;
                case 'Boolean':
                  cell.type = Boolean;
                  break;
              }
            }
          }
          writeXlsxFile(data, { columns }).toFile('data.xlsx').then(
            () => {
              // console.log('File created')
            },
            (error) => {
              console.error(error)
              alert('There was an error. See console output for the error stack trace.')
            }
          )
        } catch (error) {
          console.error(error)
          alert("There was an error. See console output for the error stack trace.")
        }
      })
    </script>
  </body>
</html>
